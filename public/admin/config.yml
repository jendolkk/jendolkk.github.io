backend:
  name: git-gateway
  repo: jendolkk/jendolkk.github.io
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c1346ff4-647f-4459-8999-49c317489e8e/pkce
  auth_token_endpoint: /sites/c1346ff4-647f-4459-8999-49c317489e8e/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

site_url: https://jendolkk.github.io
display_url: https://jendolkk.github.io
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
media_folder: public/uploads
public_folder: /uploads
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: pages
    label: 页面
    files:
      - name: about
        label: 关于
        file: src/content/pages/about.md
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 描述, name: description, widget: text }
          - { label: 正文, name: body, widget: markdown }

  - name: posts
    label: 文章
    label_singular: 文章
    folder: src/content/posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "posts/{{slug}}/"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text }
      - { label: 发布日期, name: pubDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 更新日期, name: updatedDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: 标签
        name: tags
        widget: list
        required: false
        field: { label: 标签, name: tag, widget: string }
      - { label: 草稿, name: draft, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: notes
    label: 笔记
    label_singular: 笔记
    folder: src/content/notes
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "notes/{{slug}}/"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text }
      - { label: 发布日期, name: pubDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 更新日期, name: updatedDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: 标签
        name: tags
        widget: list
        required: false
        field: { label: 标签, name: tag, widget: string }
      - { label: 草稿, name: draft, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: projects
    label: 项目
    label_singular: 项目
    folder: src/content/projects
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "projects/{{slug}}/"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text }
      - { label: 发布日期, name: pubDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 更新日期, name: updatedDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: 标签
        name: tags
        widget: list
        required: false
        field: { label: 标签, name: tag, widget: string }
      - { label: 草稿, name: draft, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown }
